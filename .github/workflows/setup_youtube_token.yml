name: Setup YouTube Token (One-time)

on:
  workflow_dispatch:
    inputs:
      auth_code:
        description: "Paste the 'code' value from the redirect URL"
        required: true
        type: string

jobs:
  exchange-token:
    runs-on: ubuntu-latest
    steps:
      - name: Exchange auth code for tokens
        run: |
          echo "Exchanging authorization code for tokens..."

          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "code=${{ github.event.inputs.auth_code }}" \
            -d "client_id=${{ secrets.YOUTUBE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.YOUTUBE_CLIENT_SECRET }}" \
            -d "redirect_uri=http://localhost" \
            -d "grant_type=authorization_code")

          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token','ERROR'))")
          REFRESH_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('refresh_token','ERROR'))")

          if [ "$REFRESH_TOKEN" = "ERROR" ] || [ -z "$REFRESH_TOKEN" ]; then
            echo "❌ Failed. Response was: $RESPONSE"
            echo "Auth code expires in 60s — generate a fresh one and retry."
            exit 1
          fi

          echo ""
          echo "✅ SUCCESS — copy everything between the lines and save as YOUTUBE_TOKEN_JSON secret"
          echo "════════════════════════════════════════"
          python3 -c "
import json
print(json.dumps({
  'token': '$ACCESS_TOKEN',
  'refresh_token': '$REFRESH_TOKEN',
  'token_uri': 'https://oauth2.googleapis.com/token',
  'client_id': '${{ secrets.YOUTUBE_CLIENT_ID }}',
  'client_secret': '${{ secrets.YOUTUBE_CLIENT_SECRET }}',
  'scopes': ['https://www.googleapis.com/auth/youtube.upload'],
  'expiry': '2030-01-01T00:00:00Z'
}, indent=2))
"
          echo "════════════════════════════════════════"

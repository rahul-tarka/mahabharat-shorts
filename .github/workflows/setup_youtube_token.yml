name: Setup YouTube Token (One-time)

on:
  push:
    paths:
      - "config/auth_code.txt"

jobs:
  exchange-token:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Exchange auth code for tokens
        run: |
          AUTH_CODE=$(cat config/auth_code.txt | tr -d '[:space:]')
          echo "Exchanging auth code..."

          RESPONSE=$(curl -s -X POST https://oauth2.googleapis.com/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "code=${AUTH_CODE}" \
            -d "client_id=${{ secrets.YOUTUBE_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.YOUTUBE_CLIENT_SECRET }}" \
            -d "redirect_uri=http://localhost" \
            -d "grant_type=authorization_code")

          REFRESH_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('refresh_token',''))" 2>/dev/null)
          ACCESS_TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null)

          if [ -z "$REFRESH_TOKEN" ]; then
            echo "❌ Failed. Response: $RESPONSE"
            exit 1
          fi

          echo ""
          echo "✅ SUCCESS! Copy the JSON below and add as GitHub Secret: YOUTUBE_TOKEN_JSON"
          echo "════════════════════════════════════════"
          python3 -c "
import json
print(json.dumps({
  'token': '$ACCESS_TOKEN',
  'refresh_token': '$REFRESH_TOKEN',
  'token_uri': 'https://oauth2.googleapis.com/token',
  'client_id': '${{ secrets.YOUTUBE_CLIENT_ID }}',
  'client_secret': '${{ secrets.YOUTUBE_CLIENT_SECRET }}',
  'scopes': ['https://www.googleapis.com/auth/youtube.upload'],
  'expiry': '2030-01-01T00:00:00Z'
}, indent=2))
"
          echo "════════════════════════════════════════"

      - name: Delete auth_code.txt after use
        run: |
          git config user.name "Mahabharat Bot"
          git config user.email "bot@mahabharat-shorts.auto"
          rm config/auth_code.txt
          git add config/auth_code.txt
          git commit -m "chore: remove auth code after token exchange [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
